services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rms}
      POSTGRES_USER: ${POSTGRES_USER:-rms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rms-local-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rms} -d ${POSTGRES_DB:-rms}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rmsminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rms-minio-local-password}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./backend/seed_data:/seed:ro
    entrypoint: >-
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-rmsminio} ${MINIO_ROOT_PASSWORD:-rms-minio-local-password};
      mc mb --ignore-existing local/${MINIO_BUCKET:-rms};
      mc cp /seed/offer_template_v1.html local/${MINIO_BUCKET:-rms}/templates/offer_template_v1.html;
      "
    restart: "no"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rms}:${POSTGRES_PASSWORD:-rms-local-password}@db:5432/${POSTGRES_DB:-rms}
      PG_SCHEMA: ${PG_SCHEMA:-schema_07}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-rmsminio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-rms-minio-local-password}
      MINIO_SECURE: "false"
      MINIO_BUCKET: ${MINIO_BUCKET:-rms}
      JWT_SECRET: ${JWT_SECRET:-replace-this-before-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      APP_ENV: ${APP_ENV:-dev}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: >-
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers"
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
